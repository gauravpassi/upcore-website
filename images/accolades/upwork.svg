<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" fill="none">
  <!-- Hexagonal badge shape -->
  <polygon points="60,4 112,32 112,98 60,126 8,98 8,32"
    fill="#ffffff" stroke="#d1d5db" stroke-width="2.5"/>
  <!-- Inner shadow ring -->
  <polygon points="60,10 106,36 106,94 60,120 14,94 14,36"
    fill="none" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Upwork "up" circle logo -->
  <circle cx="60" cy="38" r="16" fill="#14a800"/>
  <text x="60" y="44" font-family="Arial Black,Arial,sans-serif" font-size="14"
    font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">up</text>

  <!-- "Upwork" wordmark -->
  <text x="60" y="70" font-family="Arial Black,Arial,sans-serif" font-size="17"
    font-weight="900" fill="#1a1a1a" text-anchor="middle" letter-spacing="-0.3">
    <tspan fill="#14a800">Up</tspan><tspan fill="#1a1a1a">work</tspan>
  </text>

  <!-- Green ribbon banner -->
  <rect x="4" y="80" width="112" height="26" rx="0" fill="#14a800"/>
  <!-- Ribbon left notch -->
  <polygon points="4,80 4,106 14,93" fill="#0d8a00"/>
  <!-- Ribbon right notch -->
  <polygon points="116,80 116,106 106,93" fill="#0d8a00"/>

  <!-- Diamond gem icon in ribbon -->
  <polygon points="18,93 22,87 26,93 22,99" fill="#ff4d4d" stroke="none"/>
  <polygon points="18,93 22,87 22,93" fill="#ff7070"/>

  <!-- "TOP RATED PLUS" text -->
  <text x="66" y="97" font-family="Arial Black,Arial,sans-serif" font-size="9"
    font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">TOP RATED PLUS</text>
</svg>
