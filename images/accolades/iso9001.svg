<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- ISO 9001 certification badge - circular seal style -->
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="47" stroke="#D4A017" stroke-width="2.5" fill="none"/>
  <circle cx="50" cy="50" r="43" stroke="#D4A017" stroke-width="0.8" stroke-dasharray="3 2" fill="none"/>
  <!-- Inner fill -->
  <circle cx="50" cy="50" r="40" fill="#1a1200" opacity="0.6"/>
  <!-- ISO text -->
  <text x="50" y="38" font-family="Arial Black, Arial, sans-serif" font-size="16" font-weight="900" fill="#D4A017" text-anchor="middle" letter-spacing="2">ISO</text>
  <!-- Divider line -->
  <line x1="25" y1="43" x2="75" y2="43" stroke="#D4A017" stroke-width="1"/>
  <!-- Number -->
  <text x="50" y="58" font-family="Arial Black, Arial, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF" text-anchor="middle">9001</text>
  <!-- Year -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="8" fill="#D4A017" text-anchor="middle" letter-spacing="1">2015</text>
  <!-- Bottom arc text -->
  <path id="bottomArc9001" d="M 18 70 A 35 35 0 0 0 82 70" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="7" fill="#D4A017" letter-spacing="0.5">
    <textPath href="#bottomArc9001" startOffset="10%">CERTIFIED · QUALITY</textPath>
  </text>
</svg>
