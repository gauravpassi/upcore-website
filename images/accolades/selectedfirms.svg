<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sfBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2196c4"/>
      <stop offset="100%" stop-color="#1565a8"/>
    </radialGradient>
  </defs>

  <!-- Outer circle with dotted/dashed border -->
  <circle cx="100" cy="100" r="98" fill="url(#sfBg)"/>

  <!-- Dotted outer ring pattern -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.5"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

  <!-- White inner circle -->
  <circle cx="100" cy="100" r="82" fill="#ffffff"/>

  <!-- SelectedFirms S-check logo mark (blue circle with white S-check) -->
  <circle cx="100" cy="62" r="22" fill="#1a73c8"/>
  <!-- S-curve / checkmark combo mark -->
  <path d="M91 55 Q94 50 100 52 Q107 54 105 60 Q103 64 97 65 Q91 67 90 73 Q89 79 96 81 Q103 83 107 78"
    fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- "SelectedFirms" text -->
  <text x="100" y="100" font-family="Arial,sans-serif" font-size="14" font-weight="700"
    fill="#1a73c8" text-anchor="middle" letter-spacing="0.5">SelectedFirms</text>

  <!-- Green ribbon banner -->
  <rect x="8" y="108" width="184" height="46" fill="#3cb371"/>
  <!-- Left ribbon notch -->
  <polygon points="8,108 8,154 20,131" fill="#2e8b57"/>
  <!-- Right ribbon notch -->
  <polygon points="192,108 192,154 180,131" fill="#2e8b57"/>
  <!-- Banner text line 1 -->
  <text x="100" y="127" font-family="Arial Black,Arial,sans-serif" font-size="11" font-weight="900"
    fill="#ffffff" text-anchor="middle" letter-spacing="0.3">Top Software</text>
  <!-- Banner text line 2 -->
  <text x="100" y="143" font-family="Arial Black,Arial,sans-serif" font-size="10" font-weight="900"
    fill="#ffffff" text-anchor="middle" letter-spacing="0.3">Development Company</text>

  <!-- Bottom arc text: "selectedfirms.co" -->
  <path id="sfBottomArc" d="M 20,140 A 83,83 0 0,0 180,140" fill="none"/>
  <text font-family="Arial,sans-serif" font-size="9" fill="#ffffff" opacity="0.8">
    <textPath href="#sfBottomArc" startOffset="18%">selectedfirms.co</textPath>
  </text>
</svg>
