<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- SelectedFirms award badge recreation -->
  <!-- Outer scalloped ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#22c55e" stroke-width="2"/>
  <!-- Decorative notches around ring -->
  <circle cx="50" cy="4" r="2.5" fill="#22c55e"/>
  <circle cx="50" cy="96" r="2.5" fill="#22c55e"/>
  <circle cx="4" cy="50" r="2.5" fill="#22c55e"/>
  <circle cx="96" cy="50" r="2.5" fill="#22c55e"/>
  <circle cx="18" cy="18" r="2" fill="#22c55e"/>
  <circle cx="82" cy="18" r="2" fill="#22c55e"/>
  <circle cx="18" cy="82" r="2" fill="#22c55e"/>
  <circle cx="82" cy="82" r="2" fill="#22c55e"/>
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="40" fill="#001a0a" opacity="0.7"/>
  <circle cx="50" cy="50" r="38" stroke="#22c55e" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Trophy/award icon -->
  <path d="M42 28 L58 28 L56 42 Q50 48 44 42 Z" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="35" y1="28" x2="42" y2="32" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="65" y1="28" x2="58" y2="32" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="48" x2="50" y2="54" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="44" y1="54" x2="56" y2="54" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
  <!-- "TOP" text -->
  <text x="50" y="68" font-family="Arial Black, Arial, sans-serif" font-size="10" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">TOP</text>
  <!-- "COMPANY" text -->
  <text x="50" y="78" font-family="Arial, sans-serif" font-size="7" fill="#4ade80" text-anchor="middle" letter-spacing="1.5">COMPANY</text>
  <!-- Top arc text -->
  <path id="topArcSF" d="M 14 46 A 38 38 0 0 1 86 46" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="6.5" fill="#4ade80">
    <textPath href="#topArcSF" startOffset="8%">SELECTED FIRMS</textPath>
  </text>
</svg>
